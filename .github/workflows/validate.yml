name: Validate dashboard

on:
  push:
    paths:
      - 'public/**'
      - 'scripts/**'
  pull_request:
    paths:
      - 'public/**'
      - 'scripts/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm run smoke
      - run: npm run validate
